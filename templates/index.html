<!DOCTYPE html>
<html>
<head>
    <title>UniEvent</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>University Events</h1>

<div class="events">

{% for event in events %}

<div class="card">
    <h3>{{ event.name }}</h3>
    <p>Date: {{ event.date }}</p>
    <p>Venue: {{ event.venue }}</p>
</div>

{% endfor %}

</div>

</body>
</html>
